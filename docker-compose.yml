version: '3.8'

services:
  entropy:
    build: .
    container_name: entropy_relay
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.production
    depends_on:
      cache:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 512M
        reservations:
          memory: 128M

  cache:
    image: redis:7-alpine
    container_name: entropy_redis
    restart: always
    # Ghost Mode: 100% RAM-based. No disk traces.
    command: ["redis-server", "--requirepass", "${ENTROPY_REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", "", "--appendonly", "no", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${ENTROPY_REDIS_PASSWORD}", "ping"]
      interval: 10s
    deploy:
      resources:
        limits:
          memory: 256M

# volumes section removed for 100% ephemerality
