name: Entropy Server CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libssl-dev \
          libboost-system-dev \
          libboost-thread-dev \
          libboost-json-dev \
          gcc-13 \
          g++-13 \
          redis-tools

    - name: Configure CMake
      run: |
        export CC=gcc-13
        export CXX=g++-13
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Build
      run: |
        cmake --build build -j$(nproc)

    - name: Run Tests
      env:
        CTEST_OUTPUT_ON_FAILURE: 1
      run: |
        cd build
        ctest --output-on-failure --verbose
